<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>
    <link rel="stylesheet" href="./style/dash.css" />
    <!-- <link rel="stylesheet" href="../css/style.css" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.6/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favivons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicons/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicons/favicon.ico"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <script
      src="https://cdn.tiny.cloud/1/t6gjxq5zlevg4w7kz1aemk1mia1uzryam7y25vbxmkzvn4da/tinymce/8/tinymce.min.js"
      referrerpolicy="origin"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- <nav>
      -
      
    </nav> -->
    <div class="side-menu">
      <div class="side-menu-top">
        <div class="logo">O&H</div>
        <strong>Dashboard</strong>
      </div>
      <div class="mobile-menu-box">
        <ul>
          <li><a href="">Overview</a></li>
          <li><a href="./create.html">Devotions</a></li>
          <li><a href="">Books </a></li>
          <li><a href="">Fellowships </a></li>
          <li><a href="">Settings</a></li>
          <li><a href="./login.html">Sign out</a></li>
        </ul>
      </div>
    </div>
    <div class="container">
      <div class="card-rows">
        <div class="card">
          <p>week 10</p>
          <h4>Topic</h4>

          <button id="edit-buttons" data-edit="week">Edit</button>
        </div>
        <div class="card">
          <p>Today's devotion</p>

          <h4>Topic</h4>
          <button id="edit-buttons" data-edit="devotions">Edit</button>
        </div>
        <div class="card">
          <p>Home page scriptures</p>
          <h4>Scripture</h4>
          <button id="edit-buttons" data-edit="page-scripture">Edit</button>
        </div>
        <div class="card">
          <p>Texts..</p>
          <h4>Home page text animation texts</h4>

          <button id="edit-buttons" data-edit="home-animation">Edit</button>
        </div>
      </div>
      <div class="create-devotions">
        <div class="weekly-topics">
          <h4>Add New Week</h4>
          <form>
            <select name="week" id="week">
              <option value="Default">select week</option>
              <option value="1">1</option>
              <option value="1">2</option>
              <option value="1">3</option>
              <option value="1">4</option>
              <option value="1">5</option>
              <option value="1">6</option>
              <option value="1">7</option>
              <option value="1">8</option>
              <option value="1">9</option>
              <option value="1">10</option>
              <option value="1">11</option>
              <option value="1">12</option>
              <option value="1">13</option>
              <option value="1">14</option>
              <option value="1">15</option>
              <option value="1">16</option>
              <option value="1">17</option>
              <option value="1">18</option>
            </select>
            <br />
            <input type="text" placeholder="Year" />
            <br />
            <input type="text" placeholder=" Topic" />
            <br />
            <input type="text" placeholder="Bible verse" />
            <br />
            <!-- <input type="text" placeholder=" Enter " />
            <br /> -->
            <textarea
              name="thoughts"
              id="myTextarea"
              placeholder="Add thoughts"
            ></textarea>
            <button class="upload-week">Add Week</button>
          </form>
        </div>
        <div class="daily-devotions">
          <h4>Add New Devotion</h4>
          <form>
            <input type="date" placeholder=" date" />
            <br />
            <input type="text" placeholder=" Topic" />
            <br />
            <input type="text" placeholder=" Bible Verse" />
            <br />
            <input type="text" placeholder=" Challenge" />
            <br />
            <input type="text" placeholder="Prayer" />
            <br />

            <textarea
              name="thoughts"
              id="myTextarea"
              placeholder="Type relection"
            ></textarea>
            <button class="upload-week">Add Devotion</button>
          </form>
        </div>
      </div>
    </div>

    <div class="pop-up-container">
      <div class="close-pop-up bx bx-x"></div>
      <div class="update-daily-devotions">
        <h4>Edit Devotion</h4>
        <form action="">
          <input
            type="text"
            placeholder=" Enter Topic"
            id="devotion-topic-input"
          />
          <br />
          <input
            type="text"
            placeholder=" Enter  verse"
            id="devotion-bible-verse-input"
          />
          <br />
          <input
            type="text"
            placeholder=" Enter Prayer"
            id="devotion-prayer-input"
          />
          <br />
          <input
            type="text"
            placeholder="Enter Challenge"
            id="devotion-challlenge-input"
          />
          <br />
          <input type="date" id="devotion-date-input" />
          <br />
          <textarea></textarea>
          <button class="upload-week" id="update-devotion">Update</button>
        </form>
      </div>
      <div class="update-weekly-topics">
        <h4>Edit week</h4>
        <div>
          <input type="text" placeholder="Enter Week in Number (1-52)" />
          <button>fetch</button>
        </div>
        <form action="">
          <input type="text" placeholder=" Enter Year" />
          <br />
          <input type="text" placeholder=" Enter Topic" />
          <br />
          <input type="text" placeholder="Enter verse" />
          <br />
          <input type="date" placeholder=" date" />
          <br />
          <textarea
            name="thoughts"
            id="myTextarea"
            placeholder="reflection"
          ></textarea>
          <button class="upload-week">Update</button>
        </form>
      </div>
    </div>

    <script>
      tinymce.init({
        selector: "#myTextarea",
        height: 300,
      });
    </script>
    <script src="./scripts/dash.js" type="module"></script>
  </body>
</html>
